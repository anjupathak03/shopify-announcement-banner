services:
  - type: web
    name: shopify-announcement-banner
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: SCOPES
        value: write_products,read_themes
      - key: MONGODB_DB_NAME
        value: shopify_announcement_banner
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: HOST
        sync: false
      - key: MONGODB_URI
        sync: false
